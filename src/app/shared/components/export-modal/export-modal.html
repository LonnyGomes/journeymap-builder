<div class="modal-overlay" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">Export Journey Map</h2>
      <button mat-icon-button (click)="onClose()" aria-label="Close">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div class="modal-body">
      <div class="option-group">
        <label class="option-label">Format</label>
        <div class="option-buttons">
          <button
            class="option-btn"
            [class.active]="selectedFormat() === 'pdf'"
            (click)="selectFormat('pdf')"
          >
            <mat-icon class="option-icon">picture_as_pdf</mat-icon>
            <span class="option-text">PDF</span>
            <span class="option-desc">Best for printing</span>
          </button>
          <button
            class="option-btn"
            [class.active]="selectedFormat() === 'png'"
            (click)="selectFormat('png')"
          >
            <mat-icon class="option-icon">image</mat-icon>
            <span class="option-text">PNG</span>
            <span class="option-desc">Best for sharing</span>
          </button>
        </div>
      </div>

      @if (selectedFormat() === 'pdf') {
        <div class="option-group">
          <label class="option-label">Paper Size</label>
          <div class="option-buttons">
            <button
              class="option-btn"
              [class.active]="selectedPaperSize() === 'letter'"
              (click)="selectPaperSize('letter')"
            >
              <span class="option-text">Letter</span>
              <span class="option-desc">8.5" x 11"</span>
            </button>
            <button
              class="option-btn"
              [class.active]="selectedPaperSize() === 'tabloid'"
              (click)="selectPaperSize('tabloid')"
            >
              <span class="option-text">Tabloid</span>
              <span class="option-desc">11" x 17"</span>
            </button>
          </div>
        </div>
      }
    </div>

    <div class="modal-footer">
      <button mat-stroked-button (click)="onClose()">Cancel</button>
      <button mat-flat-button color="primary" (click)="onExport()">
        <mat-icon>download</mat-icon>
        Export
      </button>
    </div>
  </div>
</div>
