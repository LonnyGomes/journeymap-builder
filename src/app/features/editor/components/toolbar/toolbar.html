<div class="toolbar">
  <div class="toolbar-group">
    <button
      class="toolbar-btn"
      [disabled]="!canUndo()"
      (click)="undo()"
      title="Undo (Ctrl+Z)"
    >
      <span class="btn-icon">↩</span>
      <span class="btn-label">Undo</span>
    </button>
    <button
      class="toolbar-btn"
      [disabled]="!canRedo()"
      (click)="redo()"
      title="Redo (Ctrl+Shift+Z)"
    >
      <span class="btn-icon">↪</span>
      <span class="btn-label">Redo</span>
    </button>
  </div>

  <div class="toolbar-separator"></div>

  <div class="toolbar-group">
    <button class="toolbar-btn" (click)="onImportJson()" title="Import JSON">
      <span class="btn-icon">📂</span>
      <span class="btn-label">Import</span>
    </button>
    <button class="toolbar-btn" (click)="onExportJson()" title="Export JSON">
      <span class="btn-icon">💾</span>
      <span class="btn-label">Export JSON</span>
    </button>
  </div>

  <div class="toolbar-separator"></div>

  <div class="toolbar-group">
    <button class="toolbar-btn toolbar-btn-primary" (click)="onExportPdf()" title="Export as PDF">
      <span class="btn-icon">📄</span>
      <span class="btn-label">PDF</span>
    </button>
    <button class="toolbar-btn toolbar-btn-primary" (click)="onExportPng()" title="Export as PNG">
      <span class="btn-icon">🖼️</span>
      <span class="btn-label">PNG</span>
    </button>
  </div>
</div>
