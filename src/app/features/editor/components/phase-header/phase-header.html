<div class="phase-header" [style.border-top-color]="phaseColor()">
  <div class="phase-number" [style.background-color]="phaseColor()">
    {{ phase().order + 1 }}
  </div>
  <input
    type="text"
    class="phase-name-input"
    [value]="phase().name"
    (blur)="nameChange.emit($any($event.target).value)"
    (keydown.enter)="$any($event.target).blur()"
    placeholder="Phase Name"
  />
  @if (canRemove()) {
    <button
      mat-icon-button
      class="remove-btn"
      (click)="remove.emit()"
      matTooltip="Remove phase"
      aria-label="Remove phase"
    >
      <mat-icon>close</mat-icon>
    </button>
  }
</div>
