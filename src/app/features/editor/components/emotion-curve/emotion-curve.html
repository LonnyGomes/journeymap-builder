<div class="emotion-curve-container">
  <svg
    [attr.width]="svgWidth()"
    [attr.height]="svgHeight"
    [attr.viewBox]="'0 0 ' + svgWidth() + ' ' + svgHeight"
    class="emotion-curve-svg"
    preserveAspectRatio="none"
  >
    <defs>
      <!-- Gradient for the curve line -->
      <linearGradient [attr.id]="gradientId" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--emotion-positive)" stop-opacity="1" />
        <stop offset="50%" stop-color="var(--emotion-neutral)" stop-opacity="1" />
        <stop offset="100%" stop-color="var(--emotion-negative)" stop-opacity="1" />
      </linearGradient>

      <!-- Gradient for the filled area -->
      <linearGradient [attr.id]="areaGradientId" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--emotion-positive)" stop-opacity="0.08" />
        <stop offset="50%" stop-color="var(--emotion-neutral)" stop-opacity="0.05" />
        <stop offset="100%" stop-color="var(--emotion-negative)" stop-opacity="0.08" />
      </linearGradient>
    </defs>

    <!-- Subtle horizontal guide lines -->
    <line
      x1="0"
      [attr.y1]="getYAxisY(0)"
      [attr.x2]="svgWidth()"
      [attr.y2]="getYAxisY(0)"
      stroke="var(--color-border)"
      stroke-width="1"
      stroke-dasharray="4 4"
      opacity="0.5"
    />
    <line
      x1="0"
      [attr.y1]="getYAxisY(0.5)"
      [attr.x2]="svgWidth()"
      [attr.y2]="getYAxisY(0.5)"
      stroke="var(--color-border)"
      stroke-width="1"
      stroke-dasharray="4 4"
      opacity="0.5"
    />
    <line
      x1="0"
      [attr.y1]="getYAxisY(1)"
      [attr.x2]="svgWidth()"
      [attr.y2]="getYAxisY(1)"
      stroke="var(--color-border)"
      stroke-width="1"
      stroke-dasharray="4 4"
      opacity="0.5"
    />

    @if (hasEnoughPoints()) {
      <!-- Filled area under curve -->
      <path
        [attr.d]="areaPath()"
        [attr.fill]="'url(#' + areaGradientId + ')'"
      />

      <!-- Main curve line -->
      <path
        [attr.d]="curvePath()"
        fill="none"
        [attr.stroke]="'url(#' + gradientId + ')'"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="curve-line"
      />
    }

    <!-- Data points -->
    @for (point of points(); track $index) {
      <!-- Outer glow ring -->
      <circle
        [attr.cx]="point.x"
        [attr.cy]="point.y"
        r="16"
        [attr.fill]="getPointColor(point.level)"
        opacity="0.1"
        class="point-glow"
      />

      <!-- Point circle -->
      <circle
        [attr.cx]="point.x"
        [attr.cy]="point.y"
        r="10"
        fill="white"
        [attr.stroke]="getPointColor(point.level)"
        stroke-width="2"
        class="point-circle"
      />

      <!-- Emoji text -->
      <text
        [attr.x]="point.x"
        [attr.y]="point.y + 1"
        text-anchor="middle"
        dominant-baseline="central"
        font-size="12"
        class="point-emoji"
      >{{ point.emoji }}</text>
    }
  </svg>

  @if (!hasEnoughPoints()) {
    <div class="empty-state">
      <span class="empty-hint">Select emotions in at least 2 phases to see the emotional arc</span>
    </div>
  }
</div>
