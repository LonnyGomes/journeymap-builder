<div class="phase-column">
  <app-phase-header
    [phase]="phase()"
    [canRemove]="canRemove()"
    [isLast]="isLast()"
    [phaseColor]="phaseColor()"
    (nameChange)="nameChange.emit($event)"
    (remove)="remove.emit()"
  />

  <div class="phase-cell actions-cell">
    <app-editable-cell
      [value]="phase().actions"
      [renderMarkdown]="true"
      placeholder="What actions does the user take?"
      (valueChange)="actionsChange.emit($event)"
    />
  </div>

  <div class="phase-cell mindsets-cell">
    <app-editable-cell
      [value]="phase().mindsets"
      [renderMarkdown]="true"
      placeholder="What is the user thinking?"
      (valueChange)="mindsetsChange.emit($event)"
    />
  </div>

  <!-- Spacer for Emotional Arc row (SVG curve overlay occupies this space) -->
  <div class="phase-cell emotion-arc-spacer"></div>

  <div class="phase-cell emotion-cell">
    <button class="emotion-btn" (click)="showEmotionPicker.emit()">
      @if (phase().emotion) {
        <span class="emotion-display">{{ phase().emotion }}</span>
        <span class="emotion-label">{{ getEmotionLabel(phase().emotion) }}</span>
      } @else {
        <span class="emotion-placeholder">
          <span class="emotion-placeholder-icon">😶</span>
          <span>Set emotion</span>
        </span>
      }
    </button>
  </div>

  <div class="phase-cell opportunities-cell">
    <app-editable-cell
      [value]="phase().opportunities"
      [renderMarkdown]="true"
      placeholder="What opportunities exist?"
      (valueChange)="opportunitiesChange.emit($event)"
    />
  </div>
</div>
